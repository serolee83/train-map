<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>탁송기사용 KTX 철도망 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100%; z-index: 1; }
        
        .info-window { padding: 5px; font-weight: bold; font-size: 14px; color: #1e293b; }
        
        /* 카카오맵 스타일 오른쪽 아래 내 위치 버튼 */
        .btn-mylocation { 
            position: absolute; bottom: 20px; right: 15px; z-index: 999;
            background: #ffffff; color: #1e293b; border: 2px solid #cbd5e1;
            padding: 12px 16px; border-radius: 30px; font-weight: bold; font-size: 14px;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 4px;
        }
        .btn-mylocation:active { background: #f1f5f9; transform: scale(0.95); }

        /* 지도 범례 (좌측 하단 배치) */
        .legend {
            position: absolute; bottom: 20px; left: 15px; z-index: 999;
            background: rgba(255, 255, 255, 0.95); padding: 12px; border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); font-size: 10.5px; font-weight: bold; line-height: 1.6;
        }
        .legend-color { display: inline-block; width: 25px; height: 6px; margin-right: 8px; vertical-align: middle; border-radius: 3px; }
        
        /* 상단 상태바 */
        .status-bar {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 999;
            background: rgba(255, 255, 255, 0.95); padding: 10px 20px; border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 14px; font-weight: bold; color: #1e40af;
            display: flex; align-items: center; gap: 10px;
        }

        /* 역 이름 라벨 스타일 */
        .station-label {
            background: transparent;
            border: none;
            box-shadow: none;
            font-weight: bold;
            font-size: 12px;
            color: #0f172a;
            text-shadow: 1px 1px 0 #fff, -1px 1px 0 #fff, 1px -1px 0 #fff, -1px -1px 0 #fff, 0px 0px 3px #fff;
        }
        /* 스크롤바 꾸미기 */
        .scrollable-list::-webkit-scrollbar { width: 6px; }
        .scrollable-list::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .scrollable-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .scrollable-list::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>

    <div class="status-bar" id="statusBar">
        <span>지도 데이터를 준비중입니다...</span>
    </div>

    <button class="btn-mylocation" onclick="findMyLocation()">📍 내 위치로</button>

    <div class="legend">
        <div style="font-size: 11.5px; border-bottom: 1px solid #e2e8f0; margin-bottom: 5px; padding-bottom: 3px; color:#1e40af;">🚂 전국 KTX 노선망</div>
        <div><span class="legend-color" style="background:#1e40af;"></span>경부선 (서울~부산)</div>
        <div><span class="legend-color" style="background:#10b981;"></span>호남선 (오송~목포)</div>
        <div><span class="legend-color" style="background:#f97316;"></span>전라선 (익산~여수)</div>
        <div><span class="legend-color" style="background:#8b5cf6;"></span>강릉선 (서울~강릉/동해)</div>
        <div><span class="legend-color" style="background:#dc2626;"></span>경전선 (밀양~진주)</div>
        <div><span class="legend-color" style="background:#a16207;"></span>중앙선 (청량리~안동)</div>
        <div><span class="legend-color" style="background:#d946ef;"></span>중부내륙선 (판교~충주)</div>
    </div>

    <div id="map"></div>

    <script>
        // 1. 지도 초기화 (대한민국 중심부 셋업)
        var map = L.map('map').setView([36.25, 127.6], 7.5);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var myLocationMarker = null;
        var myLocationCircle = null;

        // 운임 데이터 로드 로직
        const excelFiles = [
            { name: 'KTX', path: 'KTX 운임표(2026.04.15.부터).xls' }
        ];

        let fareDatabase = {};

        async function loadFareData() {
            document.getElementById('statusBar').innerHTML = `<span>운임표 데이터를 불러오는 중... ⏳</span>`;
            
            for (let file of excelFiles) {
                try {
                    const res = await fetch(file.path);
                    if (!res.ok) continue;
                    const ab = await res.arrayBuffer();
                    const workbook = XLSX.read(ab, { type: 'array' });
                    
                    // 각 시트마다 데이터 파싱 (다양한 노선이 다른 시트에 있을 수 있음)
                    let allRows = [];
                    workbook.SheetNames.forEach(sheetName => {
                        const sheet = workbook.Sheets[sheetName];
                        const json = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                        allRows = allRows.concat(json);
                    });
                    
                    fareDatabase[file.name] = allRows;
                } catch(e) {
                    console.warn("데이터 로드 실패 (파일이 서버에 있는지 확인하세요):", file.name, e);
                }
            }
            document.getElementById('statusBar').innerHTML = `<span>✅ KTX 운임표 로드 완료! 역을 클릭하세요.</span>`;
        }

        function findAllFares(dep) {
            const data = fareDatabase['KTX'];
            if (!data) return [];
            
            let destinations = {};

            for (let i = 0; i < data.length; i++) {
                const row = data[i];
                if (!row || row.length < 4) continue;
                
                let colDep = String(row[1] || '').trim();
                let colArr = String(row[2] || '').trim();
                let fare = row[3];
                
                // 역 이름에서 '역' 글자 제거 및 공백 제거하여 유연하게 매칭
                const cleanName = (name) => name.replace(/역$/, '').trim();
                let cDep = cleanName(dep);
                let rDep = cleanName(colDep);
                let rArr = cleanName(colArr);
                
                let targetStation = null;
                if (rDep === cDep) targetStation = rArr + "역";
                else if (rArr === cDep) targetStation = rDep + "역";
                
                if (targetStation) {
                    let fareValue = parseInt(String(fare).replace(/,/g, ''), 10);
                    if (!isNaN(fareValue) && fareValue > 0) {
                        if (!destinations[targetStation] || fareValue < destinations[targetStation]) {
                            destinations[targetStation] = fareValue;
                        }
                    }
                }
            }
            
            let result = [];
            for (let st in destinations) {
                result.push({ name: st, fare: destinations[st] });
            }
            // 요금순 정렬
            result.sort((a, b) => a.fare - b.fare);
            return result;
        }

        function formatCurrency(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",") + '원';
        }

        function onStationClick(stationName) {
            let reachable = findAllFares(stationName);
            
            let html = \`<div class="info-window" style="text-align:center; min-width: 220px;">
                <div style="font-size:15px; color:#1e40af; border-bottom:2px solid #1e40af; padding-bottom:6px; margin-bottom:8px;">
                    🚉 <b>\${stationName}</b> 출발 노선 및 운임
                </div>\`;
            
            if (reachable.length === 0) {
                html += \`<div style="color:#64748b; font-size:12px; padding: 15px;">운임 정보가 로드되지 않았거나<br>엑셀표에 직통 노선이 없습니다.</div>\`;
            } else {
                html += \`<div class="scrollable-list" style="max-height: 220px; overflow-y: auto; text-align: left; padding-right: 8px;">\`;
                reachable.forEach(dest => {
                    html += \`<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 6px; font-size:13px; border-bottom:1px solid #f1f5f9; padding-bottom:4px;">
                        <span>➡️ \${dest.name}</span>
                        <span style="color:#0f172a; font-weight:bold; font-size:14px; background:#f8fafc; padding:2px 6px; border-radius:4px;">\${formatCurrency(dest.fare)}</span>
                    </div>\`;
                });
                html += \`</div>\`;
            }
            html += \`</div>\`;
            return html;
        }

        // GPS 내 위치 트래킹
        function findMyLocation() {
            if (!navigator.geolocation) {
                alert("GPS 위치 추적을 지원하지 않습니다.");
                return;
            }
            map.locate({setView: true, maxZoom: 14});
        }

        map.on('locationfound', function(e) {
            if (myLocationMarker) { map.removeLayer(myLocationMarker); map.removeLayer(myLocationCircle); }
            myLocationMarker = L.marker(e.latlng, {
                icon: L.icon({
                    iconUrl: 'https://cdn-icons-png.flaticon.com/512/5813/5813583.png',
                    iconSize: [35, 35], iconAnchor: [17, 35]
                })
            }).addTo(map).bindPopup("<div class='info-window'>📍 기사님 현재 위치</div>").openPopup();
            myLocationCircle = L.circle(e.latlng, e.accuracy / 2, { color: '#ef4444', fillColor: '#fca5a5', fillOpacity: 0.15 }).addTo(map);
        });

        map.on('locationerror', function(e) {
            alert("위치 정보를 가져오지 못했습니다. 핸드폰 GPS 위치서비스를 켜주세요.");
        });

        // 2. 대한민국 정식 KTX 철도역 데이터베이스 구축
        var stations = [
            // 경부선 계열
            { name: "서울역", lat: 37.5546, lng: 126.9706 }, { name: "용산역", lat: 37.5298, lng: 126.9648 }, { name: "영등포역", lat: 37.5164, lng: 126.9063 }, { name: "수원역", lat: 37.2659, lng: 126.9999 },
            { name: "광명역", lat: 37.4168, lng: 126.8837 }, { name: "천안아산역", lat: 36.7944, lng: 127.1043 }, { name: "오송역", lat: 36.6202, lng: 127.3275 },
            { name: "대전역", lat: 36.3323, lng: 127.4342 }, { name: "김천구미역", lat: 36.1130, lng: 128.1818 }, { name: "서대구역", lat: 35.8778, lng: 128.5365 }, { name: "동대구역", lat: 35.8799, lng: 128.6285 },
            { name: "경주역", lat: 35.7972, lng: 129.1394 }, { name: "울산역", lat: 35.5510, lng: 129.1382 }, { name: "경산역", lat: 35.8190, lng: 128.7291 }, { name: "밀양역", lat: 35.4746, lng: 128.7716 },
            { name: "물금역", lat: 35.3121, lng: 128.9818 }, { name: "구포역", lat: 35.2123, lng: 128.9964 }, { name: "부산역", lat: 35.1152, lng: 129.0422 },
            // 포항 (동해선 분기)
            { name: "포항역", lat: 36.0719, lng: 129.3418 },
            // 호남선 계열
            { name: "공주역", lat: 36.3116, lng: 127.2141 }, { name: "서대전역", lat: 36.3228, lng: 127.4039 }, { name: "계룡역", lat: 36.2736, lng: 127.2530 }, { name: "논산역", lat: 36.2132, lng: 127.0984 }, { name: "익산역", lat: 35.9409, lng: 126.9429 },
            { name: "김제역", lat: 35.8055, lng: 126.8887 }, { name: "정읍역", lat: 35.5683, lng: 126.8426 }, { name: "장성역", lat: 35.2974, lng: 126.7847 }, { name: "광주송정역", lat: 35.1345, lng: 126.7912 }, { name: "나주역", lat: 35.0142, lng: 126.7169 }, { name: "목포역", lat: 34.7911, lng: 126.3864 },
            // 전라선 계열
            { name: "전주역", lat: 35.8497, lng: 127.1619 }, { name: "남원역", lat: 35.4225, lng: 127.3752 }, { name: "곡성역", lat: 35.2818, lng: 127.3015 }, { name: "구례구역", lat: 35.1631, lng: 127.4721 },
            { name: "순천역", lat: 34.9456, lng: 127.5034 }, { name: "여천역", lat: 34.7709, lng: 127.6534 }, { name: "여수엑스포역", lat: 34.7525, lng: 127.7458 },
            // 강릉선 계열
            { name: "청량리역", lat: 37.5801, lng: 127.0451 }, { name: "양평역", lat: 37.4927, lng: 127.4918 }, { name: "서원주역", lat: 37.3820, lng: 127.8593 }, { name: "만종역", lat: 37.3619, lng: 127.8924 },
            { name: "횡성역", lat: 37.4994, lng: 127.9944 }, { name: "둔내역", lat: 37.5144, lng: 128.2166 }, { name: "평창역", lat: 37.5459, lng: 128.3986 }, { name: "진부역", lat: 37.6375, lng: 128.5639 }, { name: "강릉역", lat: 37.7628, lng: 128.8985 },
            { name: "정동진역", lat: 37.6916, lng: 129.0332 }, { name: "묵호역", lat: 37.5503, lng: 129.1121 }, { name: "동해역", lat: 37.4915, lng: 129.1129 },
            // 경전선
            { name: "창원중앙역", lat: 35.2361, lng: 128.6918 }, { name: "마산역", lat: 35.2351, lng: 128.5815 }, { name: "진주역", lat: 35.1485, lng: 128.1176 },
            // 중앙선
            { name: "원주역", lat: 37.3117, lng: 127.9461 }, { name: "제천역", lat: 37.1287, lng: 128.2012 }, { name: "단양역", lat: 36.9696, lng: 128.3499 }, { name: "풍기역", lat: 36.8722, lng: 128.5275 }, { name: "영주역", lat: 36.8094, lng: 128.6258 }, { name: "안동역", lat: 36.5756, lng: 128.6756 },
            // 중부내륙선
            { name: "판교역", lat: 37.3948, lng: 127.1112 }, { name: "부발역", lat: 37.2602, lng: 127.4902 }, { name: "충주역", lat: 36.9818, lng: 127.9142 }
        ];

        // 지도상 마커 출력
        stations.forEach(function(station) {
            let marker = L.marker([station.lat, station.lng]).addTo(map);
            
            // 역명 항상 표시 (툴팁)
            marker.bindTooltip("(" + station.name + ")", {
                permanent: true,
                direction: 'right',
                className: 'station-label',
                offset: [10, 0]
            });

            marker.on('click', function(e) {
                let popupContent = onStationClick(station.name);
                marker.bindPopup(popupContent, { minWidth: 220, maxWidth: 300 }).openPopup();
            });
        });

        // 3. KTX 간선 철도선 연결
        // 🔵 1. 경부선 (블루)
        L.polyline([[37.5546, 126.9706], [37.5298, 126.9648], [37.5164, 126.9063], [37.2659, 126.9999], [37.4168, 126.8837], [36.7944, 127.1043], [36.6202, 127.3275], [36.3323, 127.4342], [36.1130, 128.1818], [35.8778, 128.5365], [35.8799, 128.6285], [35.7972, 129.1394], [35.5510, 129.1382], [35.8190, 128.7291], [35.4746, 128.7716], [35.3121, 128.9818], [35.2123, 128.9964], [35.1152, 129.0422]], { color: '#1e40af', weight: 6, opacity: 0.9 }).addTo(map);
        // 🟢 2. 호남선 (초록)
        L.polyline([[36.6202, 127.3275], [36.3116, 127.2141], [36.3228, 127.4039], [36.2736, 127.2530], [36.2132, 127.0984], [35.9409, 126.9429], [35.8055, 126.8887], [35.5683, 126.8426], [35.2974, 126.7847], [35.1345, 126.7912], [35.0142, 126.7169], [34.7911, 126.3864]], { color: '#10b981', weight: 6, opacity: 0.9 }).addTo(map);
        // 🟠 3. 전라선 (오렌지)
        L.polyline([[35.9409, 126.9429], [35.8497, 127.1619], [35.4225, 127.3752], [35.2818, 127.3015], [35.1631, 127.4721], [34.9456, 127.5034], [34.7709, 127.6534], [34.7525, 127.7458]], { color: '#f97316', weight: 6, opacity: 0.9 }).addTo(map);
        // 🟣 4. 강릉선 (보라)
        L.polyline([[37.5546, 126.9706], [37.5801, 127.0451], [37.4927, 127.4918], [37.3820, 127.8593], [37.3619, 127.8924], [37.4994, 127.9944], [37.5144, 128.2166], [37.5459, 128.3986], [37.6375, 128.5639], [37.7628, 128.8985], [37.6916, 129.0332], [37.5503, 129.1121], [37.4915, 129.1129]], { color: '#8b5cf6', weight: 6, opacity: 0.9 }).addTo(map);
        // 🔴 5. 경전선 (빨간색)
        L.polyline([[35.4746, 128.7716], [35.2361, 128.6918], [35.2351, 128.5815], [35.1485, 128.1176]], { color: '#dc2626', weight: 6, opacity: 0.9 }).addTo(map);
        // 🟤 6. 중앙선 (갈색)
        L.polyline([[37.3820, 127.8593], [37.3117, 127.9461], [37.1287, 128.2012], [36.9696, 128.3499], [36.8722, 128.5275], [36.8094, 128.6258], [36.5756, 128.6756]], { color: '#a16207', weight: 6, opacity: 0.9 }).addTo(map);
        // 🔮 7. 중부내륙선 (마젠타)
        L.polyline([[37.3948, 127.1112], [37.2602, 127.4902], [36.9818, 127.9142]], { color: '#d946ef', weight: 6, opacity: 0.95 }).addTo(map);

        window.onload = function() {
            setTimeout(findMyLocation, 500);
            loadFareData(); // 운임 데이터 백그라운드 로드
        };
    </script>
</body>
</html>
