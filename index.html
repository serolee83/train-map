<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>탁송기사용 전국 철도 노선도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100%; z-index: 1; }
        
        /* 정보창 및 버튼 스타일 */
        .info-window { padding: 5px; min-width: 120px; text-align: center; }
        .station-title { font-weight: bold; font-size: 16px; margin-bottom: 5px; color: #1e293b; }
        .btn-select-dest { background: #ff4a8d; color: white; border: none; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; width: 100%; }
        
        /* 시간표 출력용 하단 모달 sheet (모바일 최적화) */
        #timetable-sheet { 
            position: fixed; bottom: -55%; left: 0; width: 100%; height: 50%; 
            background: white; z-index: 999; border-radius: 20px 20px 0 0; 
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15); transition: bottom 0.3s ease;
            display: flex; flex-direction: column;
        }
        #timetable-sheet.open { bottom: 0; }
        .sheet-header { padding: 15px; font-size: 18px; font-weight: bold; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-radius: 20px 20px 0 0; }
        .btn-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #64748b; }
        .sheet-content { flex: 1; overflow-y: auto; padding: 15px; }
        
        /* 목적지 선택 버튼 그리드 */
        .dest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .btn-dest { background: #f1f5f9; color: #334155; border: 1px solid #cbd5e1; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-dest:active { background: #ff4a8d; color: white; border-color: #ff4a8d; }
        
        /* 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: center; }
        th, td { padding: 10px; border-bottom: 1px solid #edf2f7; }
        th { background: #f1f5f9; color: #475569; font-weight: bold; position: sticky; top: 0; }
        .loading { text-align: center; padding: 30px; color: #64748b; font-weight: bold; }
        .btn-back { background: #64748b; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; margin-bottom: 10px; cursor: pointer; }
        
        /* 에러 로그 박스 */
        .error-log { background: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 11px; white-space: pre-wrap; overflow-x: auto; text-align: left; margin-top: 10px; }
    </style>
</head>
<body>

    <script>
        var pw = prompt("접근 비밀번호를 입력하세요:");
        if (pw !== "1234") { 
            alert("올바르지 않은 접근입니다.");
            document.body.innerHTML = "";
            window.stop();
        }
    </script>

    <div id="map"></div>

    <div id="timetable-sheet">
        <div class="sheet-header">
            <span id="sheet-title">목적지 선택</span>
            <button class="btn-close" onclick="closeSheet()">✕</button>
        </div>
        <div class="sheet-content" id="sheet-content">
            </div>
    </div>

    <script>
        // HTML 특수문자 변환 함수 (디버거용)
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        // 1. 지도 생성 (대한민국 중심부 설정)
        var map = L.map('map').setView([36.25, 127.6], 7.5);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 2. 주요 역 데이터
        var stations = [
            { name: "서울역", lat: 37.5546, lng: 126.9706, code: "NAT010032" },
            { name: "용산역", lat: 37.5298, lng: 126.9648, code: "NAT010017" },
            { name: "영등포역", lat: 37.5164, lng: 126.9063, code: "NAT010025" },
            { name: "수원역", lat: 37.2659, lng: 126.9999, code: "NAT011503" },
            { name: "천안아산역", lat: 36.7944, lng: 127.1043, code: "NAT010049" },
            { name: "오송역", lat: 36.6202, lng: 127.3275, code: "NAT010055" },
            { name: "대전역", lat: 36.3323, lng: 127.4342, code: "NAT011668" },
            { name: "동대구역", lat: 35.8799, lng: 128.6285, code: "NAT014122" },
            { name: "부산역", lat: 35.1152, lng: 129.0422, code: "NAT014445" },
            { name: "광주송정역", lat: 35.1345, lng: 126.7912, code: "NAT011608" },
            { name: "목포역", lat: 34.7911, lng: 126.3864, code: "NAT013473" },
            { name: "익산역", lat: 35.9409, lng: 126.9429, code: "NAT011634" },
            { name: "전주역", lat: 35.8497, lng: 127.1619, code: "NAT013064" },
            { name: "순천역", lat: 34.9456, lng: 127.5034, code: "NAT013217" },
            { name: "여수엑스포역", lat: 34.7525, lng: 127.7458, code: "NAT013239" }
        ];

        var PUBLIC_DATA_KEY = "e5882e03252928b4025a4146da909c9922b30ee395de3e4de79874a435f895cd";
        var currentDepStation = null;

        // 3. 역 마커 생성
        stations.forEach(function(station) {
            var marker = L.marker([station.lat, station.lng]).addTo(map);
            var content = `<div class="info-window">
                            <div class="station-title">${station.name}</div>
                            <button class="btn-select-dest" onclick="openDestSelection('${station.name}', '${station.code}')">조회하기</button>
                          </div>`;
            marker.bindPopup(content);
        });

        // 4. 핑크색 철도 노선망 연결
        var gyeongbuLine = [[37.5546, 126.9706], [37.5164, 126.9063], [37.2659, 126.9999], [36.7944, 127.1043], [36.6202, 127.3275], [36.3323, 127.4342], [35.8799, 128.6285], [35.1152, 129.0422]];
        var honamLine = [[36.6202, 127.3275], [35.9409, 126.9429], [35.1345, 126.7912], [34.7911, 126.3864]];
        var jeollaLine = [[35.9409, 126.9429], [35.8497, 127.1619], [34.9456, 127.5034], [34.7525, 127.7458]];

        L.polyline(gyeongbuLine, { color: '#ff4a8d', weight: 7, opacity: 0.85 }).addTo(map);
        L.polyline(honamLine, { color: '#ff4a8d', weight: 7, opacity: 0.85 }).addTo(map);
        L.polyline(jeollaLine, { color: '#ff4a8d', weight: 7, opacity: 0.85 }).addTo(map);

        // 5. 목적지 선택 버튼 배치
        function openDestSelection(depName, depCode) {
            currentDepStation = { name: depName, code: depCode };
            document.getElementById('sheet-title').innerText = `[${depName}] 출발 ➡️ 목적지 선택`;
            
            var html = '<div style="font-size:14px; color:#64748b; margin-bottom:10px;">이동하실 목적지 역을 선택하세요:</div>';
            html += '<div class="dest-grid">';
            stations.forEach(function(st) {
                if(st.name !== depName) {
                    html += `<button class="btn-dest" onclick="fetchTrainData('${st.code}', '${st.name}')">${st.name}</button>`;
                }
            });
            html += '</div>';
            
            document.getElementById('sheet-content').innerHTML = html;
            document.getElementById('timetable-sheet').classList.add('open');
        }

        // 6. 실시간 데이터 호출 및 모바일 화면 디버거 연동
        function fetchTrainData(arrCode, arrName) {
            document.getElementById('sheet-title').innerText = `${currentDepStation.name} ➡️ ${arrName} 열차`;
            document.getElementById('sheet-content').innerHTML = '<div class="loading">🔄 실시간 기차 정보를 가져오는 중...</div>';

            var today = new Date();
            var ymd = today.getFullYear() + String(today.getMonth() + 1).padStart(2, '0') + String(today.getDate()).padStart(2, '0');

            var baseUrl = `https://apis.data.go.kr/1613000/TrainInfo/GetStrtpntAlocFndTrainInfo?serviceKey=${encodeURIComponent(PUBLIC_DATA_KEY)}&depPlaceId=${currentDepStation.code}&arrPlaceId=${arrCode}&searchDate=${ymd}&numOfRows=60&pageNo=1&_type=json`;
            
            // raw 모드로 받아오기 위해 가장 확실한 allorigins 프록시 사용
            var proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(baseUrl)}`;

            fetch(proxyUrl)
                .then(res => {
                    if (!res.ok) throw new Error(`프록시 서버 응답 실패 (상태코드: ${res.status})`);
                    return res.text(); // 어떤 응답이든 먼저 문자열 텍스트로 가로챔
                })
                .then(text => {
                    var backBtn = `<button class="btn-back" onclick="openDestSelection('${currentDepStation.name}', '${currentDepStation.code}')">⬅️ 목적지 다시 선택</button>`;
                    
                    // 만약 정부 서버에서 에러가 나서 XML문서(<)가 날아온 경우 화면에 로그 출력
                    if (text.trim().startsWith('<')) {
                        document.getElementById('sheet-content').innerHTML = backBtn + `
                            <div class="loading" style="color:#ef4444;">❌ 정부 공공데이터 서버 에러 반환</div>
                            <div class="error-log">${escapeHtml(text)}</div>`;
                        return;
                    }

                    var data = JSON.parse(text);
                    var items = data.response?.body?.items?.item;
                    
                    if (!items) {
                        document.getElementById('sheet-content').innerHTML = backBtn + '<div class="loading">직통 운행 열차가 없거나 오늘 운행이 종료되었습니다.</div>';
                        return;
                    }

                    if (!Array.isArray(items)) { items = [items]; }
                    items.sort((a, b) => a.depplctime - b.depplctime);

                    var html = backBtn + `<table>
                                <thead>
                                    <tr>
                                        <th>열차 종류</th>
                                        <th>열차 번호</th>
                                        <th>출발 시간</th>
                                        <th>도착 시간</th>
                                    </tr>
                                </thead>
                                <tbody>`;

                    items.forEach(item => {
                        var depTime = String(item.depplctime).substring(8, 10) + ":" + String(item.depplctime).substring(10, 12);
                        var arrTime = String(item.arrplctime).substring(8, 10) + ":" + String(item.arrplctime).substring(10, 12);
                        var color = item.traingradename.includes("KTX") ? "#1e40af" : "#e11d48";

                        html += `<tr>
                                    <td style="font-weight:bold; color:${color};">${item.traingradename}</td>
                                    <td>${item.trainno}</td>
                                    <td style="font-weight:bold; color:#e11d48;">${depTime}</td>
                                    <td style="color:#64748b;">${arrTime}</td>
                                 </tr>`;
                    });

                    html += '</tbody></table>';
                    document.getElementById('sheet-content').innerHTML = html;
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('sheet-content').innerHTML = `
                        <button class="btn-back" onclick="openDestSelection('${currentDepStation.name}', '${currentDepStation.code}')">⬅️ 뒤로가기</button>
                        <div class="loading" style="color:#ef4444;">❌ 네트워크 통신 또는 코드 실행 에러</div>
                        <div class="error-log">에러 메시지: ${err.message}</div>`;
                });
        }

        function closeSheet() {
            document.getElementById('timetable-sheet').classList.remove('open');
        }
    </script>
</body>
</html>
